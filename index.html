<meta name="apple-mobile-web-app-title" content="Deutsch">
<title>Deutsch Lernen</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f0e8;
    --white: #ffffff;
    --black: #1a1a1a;
    --muted: #888;
    --light: #e0d9cc;
    --der: #2563eb;
    --die: #dc2626;
    --das: #16a34a;
    --known: #16a34a;
    --unknown: #dc2626;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: Georgia, 'Times New Roman', serif;
    color: var(--black);
    overscroll-behavior: none;
  }

  .app {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 12px;
  }

  /* Header */
  .header {
    width: 100%;
    text-align: center;
    padding: 16px 24px 0;
  }
  .title {
    font-size: clamp(1.6rem, 7vw, 2.4rem);
    font-weight: 900;
    letter-spacing: -2px;
    line-height: 1;
  }

  /* Categories */
  .categories {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 10px 16px 0;
  }
  .cat-btn {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    padding: 7px 14px;
    border-radius: 30px;
    border: 2px solid transparent;
    cursor: pointer;
    background: var(--white);
    color: #555;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .cat-btn:active { transform: scale(0.96); }
  .cat-btn.active {
    background: var(--black);
    color: var(--white);
    border-color: var(--black);
  }

  /* Genus legend */
  .legend {
    display: flex;
    gap: 12px;
    margin-top: 8px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.68rem;
    color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 4px; font-weight: 500; }
  .leg-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* Progress */
  .progress-wrap {
    width: min(440px, 90vw);
    margin-top: 10px;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .stats { display: flex; gap: 16px; }
  .stat { display: flex; align-items: center; gap: 5px; font-weight: 700; }
  .stat-dot { width: 7px; height: 7px; border-radius: 50%; }
  .progress-bar {
    width: 100%;
    height: 4px;
    background: var(--light);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--black);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* Card */
  .card-area { margin-top: 10px; }
  .card-wrapper {
    width: min(440px, 90vw);
    height: 200px;
    perspective: 1200px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-inner.go-left {
    animation: goLeft 0.28s ease forwards;
  }
  .card-inner.go-right {
    animation: goRight 0.28s ease forwards;
  }
  @keyframes goLeft {
    to { opacity: 0; transform: translateX(-60px); }
  }
  @keyframes goRight {
    to { opacity: 0; transform: translateX(60px); }
  }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.05);
  }
  .card-front { background: var(--white); }
  .card-back { background: var(--black); transform: rotateY(180deg); }

  .article-badge {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.65rem;
    font-weight: 800;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 3px 13px;
    border-radius: 20px;
    color: white;
    margin-bottom: 12px;
  }
  .verb-label {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #ccc;
    margin-bottom: 8px;
  }
  .german-word {
    font-size: clamp(1.7rem, 6vw, 2.5rem);
    font-weight: 700;
    text-align: center;
    line-height: 1.2;
    color: var(--black);
  }
  .verb-nota {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.72rem;
    color: #aaa;
    margin-top: 8px;
    text-align: center;
    font-style: italic;
  }
  .tap-hint {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #ccc;
    margin-top: 18px;
  }
  .back-label {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 12px;
  }
  .italian-word {
    font-size: clamp(1.7rem, 6vw, 2.4rem);
    font-weight: 700;
    text-align: center;
    color: #f5f0e8;
    line-height: 1.2;
  }

  /* Actions */
  .actions {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .action-btn {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    padding: 11px 24px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    transition: all 0.18s;
    -webkit-tap-highlight-color: transparent;
  }
  .action-btn:active { transform: scale(0.95); }
  .btn-known { background: var(--known); color: white; }
  .btn-unknown { background: var(--white); color: var(--black); border: 2px solid var(--light); }

  .skip-btn {
    background: none;
    border: none;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #bbb;
    font-size: 0.78rem;
    cursor: pointer;
    margin-top: 4px;
    letter-spacing: 1px;
    -webkit-tap-highlight-color: transparent;
  }

  .dir-toggle {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    padding: 7px 16px;
    border-radius: 20px;
    border: 2px solid var(--light);
    background: var(--white);
    color: var(--black);
    cursor: pointer;
    margin-top: 6px;
    letter-spacing: 0.5px;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.18s;
  }
  .dir-toggle:active { transform: scale(0.96); }
  .dir-toggle.reversed { background: var(--black); color: var(--white); border-color: var(--black); }

  /* Finished screen */
  .finished {
    width: min(440px, 90vw);
    background: var(--white);
    border-radius: 20px;
    padding: 48px 32px;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
  }
  .finished-emoji { font-size: 3rem; margin-bottom: 16px; }
  .finished-title {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .finished-sub {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.88rem;
    color: var(--muted);
    margin-bottom: 20px;
  }
  .finished-stats {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    gap: 24px;
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 28px;
  }
  .restart-btn {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    padding: 14px 36px;
    background: var(--black);
    color: white;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .restart-btn:active { transform: scale(0.96); }

  .footer {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.7rem;
    color: #ccc;
    margin-top: 36px;
    text-align: center;
  }
</style>

const GENUS_COLOR = { der: "#2563eb", die: "#dc2626", das: "#16a34a" };
const GENUS_LABEL = { der: "maschile", die: "femminile", das: "neutro" };
const LEVEL_LABELS = { A1: "A1", A2: "A2", B1: "B1", B2: "B2" };

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let state = {
  level: "A1",
  deck: shuffle(CARDS["A1"]),
  index: 0,
  flipped: false,
  direction: "de-it",
  known: new Set(),
  unknown: new Set(),
  animating: false,
  finished: false,
};

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = "de-DE";
  utt.rate = 0.82;
  speechSynthesis.speak(utt);
}

function toggleDirection() {
  state.direction = state.direction === "de-it" ? "it-de" : "de-it";
  state.flipped = false;
  render();
}

function setLevel(lvl) {
  state.level = lvl;
  state.deck = shuffle(CARDS[lvl]);
  state.index = 0;
  state.flipped = false;
  state.known = new Set();
  state.unknown = new Set();
  state.finished = false;
  render();
}

function speakCurrentGerman() {
  const c = state.deck[state.index];
  if (c) speak(c.de);
}

function flipCard() {
  if (state.animating || state.finished) return;
  state.flipped = !state.flipped;
  const isDeIt = state.direction === "de-it";
  const germanVisible = isDeIt ? !state.flipped : state.flipped;
  if (germanVisible) speakCurrentGerman();
  render();
}

function nextCard(dir, markSet) {
  if (state.animating) return;
  state.animating = true;

  if (markSet === "known") state.known.add(state.index);
  else if (markSet === "unknown") state.unknown.add(state.index);

  const nextIndex = state.index + 1;
  const isDeIt = state.direction === "de-it";
  if (isDeIt && nextIndex < state.deck.length) {
    speak(state.deck[nextIndex].de);
  }

  const inner = document.getElementById("card-inner");
  if (inner) {
    inner.classList.add(dir === "right" ? "go-right" : "go-left");
  }

  setTimeout(() => {
    if (nextIndex >= state.deck.length) {
      state.finished = true;
    } else {
      state.index = nextIndex;
    }
    state.flipped = false;
    state.animating = false;
    render();
  }, 280);
}

function restart() {
  state.deck = shuffle(CARDS[state.level]);
  state.index = 0;
  state.flipped = false;
  state.known = new Set();
  state.unknown = new Set();
  state.finished = false;
  render();
}

function render() {
  const app = document.getElementById("app");
  const card = state.deck[state.index] || {};
  const total = state.deck.length;
  const progress = (state.index / total) * 100;
  const genusColor = card.genus ? GENUS_COLOR[card.genus] : "#1a1a1a";
  const isVerbi = !!card.nota;

  const legendHTML = `
    <div class="legend">
      ${Object.entries(GENUS_COLOR).map(([g, c]) => `
        <div class="legend-item">
          <div class="leg-dot" style="background:${c}"></div>
          <span>${g} = ${GENUS_LABEL[g]}</span>
        </div>`).join("")}
    </div>`;

  const isDeIt = state.direction === "de-it";

  let frontContent, backContent;
  if (isDeIt) {
    frontContent = `
      ${card.genus ? `<div class="article-badge" style="background:${genusColor}">${card.genus}</div>` : ""}
      ${isVerbi ? `<div class="verb-label">VERBO</div>` : ""}
      <div class="german-word">${card.de || ""}</div>
      ${card.nota ? `<div class="verb-nota">${card.nota}</div>` : ""}
      <div class="tap-hint">↕ tocca per girare</div>
    `;
    backContent = `
      <div class="back-label">🇮🇹 in italiano</div>
      <div class="italian-word">${card.it || ""}</div>
    `;
  } else {
    frontContent = `
      <div class="back-label" style="color:#aaa">🇮🇹 italiano</div>
      <div class="german-word">${card.it || ""}</div>
      <div class="tap-hint">↕ tocca per girare</div>
    `;
    backContent = `
      <div class="back-label">🇩🇪 in tedesco</div>
      ${card.genus ? `<div class="article-badge" style="background:${genusColor}">${card.genus}</div>` : ""}
      ${isVerbi ? `<div class="verb-label">VERBO</div>` : ""}
      <div class="italian-word">${card.de || ""}</div>
      ${card.nota ? `<div class="verb-nota">${card.nota}</div>` : ""}
    `;
  }

  const cardAreaHTML = state.finished ? `
    <div class="finished">
      <div class="finished-emoji">🎉</div>
      <div class="finished-title">Completato!</div>
      <div class="finished-sub">Hai studiato ${total} parole (livello ${state.level})</div>
      <div class="finished-stats">
        <span style="color:#16a34a">✓ ${state.known.size} conosciute</span>
        <span style="color:#dc2626">✗ ${state.unknown.size} da ripassare</span>
      </div>
      <button class="restart-btn" onclick="restart()">Ricomincia →</button>
    </div>
  ` : `
    <div class="card-wrapper" onclick="flipCard()">
      <div class="card-inner ${state.flipped ? "flipped" : ""}" id="card-inner">
        <div class="card-face card-front">${frontContent}</div>
        <div class="card-face card-back">${backContent}</div>
      </div>
    </div>
  `;

  const actionsHTML = state.finished ? "" : `
    <div class="actions">
      <button class="action-btn btn-unknown" onclick="nextCard('left','unknown')">✗ Da ripassare</button>
      <button class="action-btn btn-known" onclick="nextCard('right','known')">✓ La so!</button>
    </div>
    <button class="skip-btn" onclick="nextCard('right',null)">salta →</button>
  `;

  app.innerHTML = `
    <div class="header">
      <div class="title">Deutsch Lernen</div>
      <button class="dir-toggle ${isDeIt ? "" : "reversed"}" onclick="toggleDirection()">
        ${isDeIt ? "🇩🇪 → 🇮🇹" : "🇮🇹 → 🇩🇪"}
      </button>
    </div>

    <div class="categories">
      ${Object.keys(LEVEL_LABELS).map(key =>
        `<button class="cat-btn ${state.level === key ? "active" : ""}" onclick="setLevel('${key}')">${key}</button>`
      ).join("")}
    </div>

    ${legendHTML}

    <div class="progress-wrap">
      <div class="progress-info">
        <span>${state.finished ? total : state.index + 1} / ${total}</span>
        <div class="stats">
          <div class="stat">
            <div class="stat-dot" style="background:#16a34a"></div>
            <span style="color:#16a34a">${state.known.size}</span>
          </div>
          <div class="stat">
            <div class="stat-dot" style="background:#dc2626"></div>
            <span style="color:#dc2626">${state.unknown.size}</span>
          </div>
        </div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${progress}%"></div>
      </div>
    </div>

    <div class="card-area">${cardAreaHTML}</div>
    ${actionsHTML}

  `;

}

// Keyboard support
document.addEventListener("keydown", (e) => {
  if (e.key === " " || e.key === "Enter") { e.preventDefault(); flipCard(); }
  else if (e.key === "ArrowRight") nextCard("right", "known");
  else if (e.key === "ArrowLeft") nextCard("left", "unknown");
  else if (e.key === "ArrowDown") nextCard("right", null);
});

render();
</script>
