<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FlashCards">
<title>FlashCards</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f0e8;
    --white: #ffffff;
    --black: #1a1a1a;
    --muted: #888;
    --light: #e0d9cc;
    --der: #2563eb;
    --die: #dc2626;
    --das: #16a34a;
    --known: #16a34a;
    --unknown: #dc2626;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: Georgia, 'Times New Roman', serif;
    color: var(--black);
    overscroll-behavior: none;
  }

  .app {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 12px;
  }

  /* Header */
  .header {
    width: 100%;
    text-align: center;
    padding: 16px 24px 0;
  }
  .title {
    font-size: clamp(1.6rem, 7vw, 2.4rem);
    font-weight: 900;
    letter-spacing: -2px;
    line-height: 1;
  }

  /* Level bar */
  .categories {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 10px 16px 0;
  }
  .cat-btn {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    padding: 7px 14px;
    border-radius: 30px;
    border: 2px solid transparent;
    cursor: pointer;
    background: var(--white);
    color: #555;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .cat-btn:active { transform: scale(0.96); }
  .cat-btn.active {
    background: var(--black);
    color: var(--white);
    border-color: var(--black);
  }

  /* Type filter */
  .filters {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 6px 16px 0;
  }
  .filter-btn {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.72rem;
    font-weight: 600;
    padding: 4px 11px;
    border-radius: 20px;
    border: 1.5px solid var(--light);
    cursor: pointer;
    background: var(--white);
    color: #777;
    transition: all 0.18s;
    -webkit-tap-highlight-color: transparent;
  }
  .filter-btn:active { transform: scale(0.96); }
  .filter-btn.active {
    background: #555;
    color: var(--white);
    border-color: #555;
  }

  /* Genus legend */
  .legend {
    display: flex;
    gap: 12px;
    margin-top: 8px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.68rem;
    color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 4px; font-weight: 500; }
  .leg-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* Progress */
  .progress-wrap {
    width: min(440px, 90vw);
    margin-top: 10px;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .stats { display: flex; gap: 16px; }
  .stat { display: flex; align-items: center; gap: 5px; font-weight: 700; }
  .stat-dot { width: 7px; height: 7px; border-radius: 50%; }
  .progress-bar {
    width: 100%;
    height: 4px;
    background: var(--light);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--black);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* Card */
  .card-area { margin-top: 10px; }
  .card-wrapper {
    width: min(440px, 90vw);
    height: 200px;
    perspective: 1200px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-inner.go-left { animation: goLeft 0.28s ease forwards; }
  .card-inner.go-right { animation: goRight 0.28s ease forwards; }
  @keyframes goLeft { to { opacity: 0; transform: translateX(-60px); } }
  @keyframes goRight { to { opacity: 0; transform: translateX(60px); } }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.05);
  }
  .card-front { background: var(--white); }
  .card-back { background: var(--black); transform: rotateY(180deg); }

  .article-badge {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.65rem; font-weight: 800; letter-spacing: 3px;
    text-transform: uppercase; padding: 3px 13px; border-radius: 20px;
    color: white; margin-bottom: 12px;
  }
  .verb-label {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase;
    color: #ccc; margin-bottom: 8px;
  }
  .german-word {
    font-size: clamp(1.7rem, 6vw, 2.5rem); font-weight: 700;
    text-align: center; line-height: 1.2; color: var(--black);
  }
  .verb-nota {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.72rem; color: #aaa; margin-top: 8px;
    text-align: center; font-style: italic;
  }
  .tap-hint {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.68rem; letter-spacing: 2px; text-transform: uppercase;
    color: #ccc; margin-top: 18px;
  }
  .back-label {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase;
    color: #666; margin-bottom: 12px;
  }
  .italian-word {
    font-size: clamp(1.7rem, 6vw, 2.4rem); font-weight: 700;
    text-align: center; color: #f5f0e8; line-height: 1.2;
  }
  .swipe-hint {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.68rem; color: #ccc; text-align: center;
    margin-top: 4px; letter-spacing: 0.5px;
  }

  /* Actions */
  .actions {
    display: flex; gap: 10px; margin-top: 12px;
    flex-wrap: wrap; justify-content: center;
  }
  .action-btn {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-weight: 700; font-size: 0.85rem; padding: 11px 24px;
    border-radius: 14px; border: none; cursor: pointer;
    transition: all 0.18s; -webkit-tap-highlight-color: transparent;
  }
  .action-btn:active { transform: scale(0.95); }
  .btn-known { background: var(--known); color: white; }
  .btn-unknown { background: var(--white); color: var(--black); border: 2px solid var(--light); }

  .dir-toggle {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.78rem; font-weight: 700; padding: 7px 16px;
    border-radius: 20px; border: 2px solid var(--light);
    background: var(--white); color: var(--black); cursor: pointer;
    margin-top: 6px; letter-spacing: 0.5px;
    -webkit-tap-highlight-color: transparent; transition: all 0.18s;
  }
  .dir-toggle:active { transform: scale(0.96); }
  .dir-toggle.reversed { background: var(--black); color: var(--white); border-color: var(--black); }

  .empty-state {
    width: min(440px, 90vw); background: var(--white); border-radius: 20px;
    padding: 40px 32px; text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--muted); font-size: 0.9rem;
  }

  /* Custom input */
  .custom-input-area {
    width: min(440px, 90vw); background: var(--white); border-radius: 20px;
    padding: 24px; box-shadow: 0 8px 40px rgba(0,0,0,0.12); margin-top: 10px;
  }
  .custom-input-area textarea {
    width: 100%; height: 200px; border: 2px solid var(--light);
    border-radius: 12px; padding: 12px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.88rem; resize: vertical; outline: none;
    color: var(--black); background: var(--bg);
  }
  .custom-input-area textarea:focus { border-color: var(--black); }
  .custom-hint {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.75rem; color: var(--muted); margin: 8px 0 12px; line-height: 1.5;
  }
  .custom-start-btn {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-weight: 700; font-size: 0.95rem; padding: 12px 32px;
    background: var(--black); color: white; border: none;
    border-radius: 14px; cursor: pointer;
    -webkit-tap-highlight-color: transparent; width: 100%;
  }
  .custom-start-btn:active { transform: scale(0.97); }
  .custom-start-btn:disabled { background: var(--light); color: var(--muted); cursor: default; }

  /* Category grid */
  .cat-grid {
    width: min(440px, 90vw);
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 14px;
  }
  .cat-grid-btn {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.78rem; font-weight: 600; padding: 14px 6px;
    border-radius: 14px; border: none; cursor: pointer;
    background: var(--white); color: var(--black);
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    text-align: center; transition: all 0.18s;
    -webkit-tap-highlight-color: transparent;
  }
  .cat-grid-btn:active { transform: scale(0.96); }
  .cat-grid-icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }
  .cat-grid-label { font-size: 0.7rem; color: #555; }

  .cat-levels {
    width: min(440px, 90vw);
    margin-top: 14px;
    text-align: center;
  }
  .cat-levels-title {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 1.1rem; font-weight: 700; margin-bottom: 14px;
  }
  .cat-level-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .cat-level-btn {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.88rem; font-weight: 700; padding: 16px;
    border-radius: 14px; border: none; cursor: pointer;
    background: var(--white); color: var(--black);
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    text-align: center; transition: all 0.18s;
    -webkit-tap-highlight-color: transparent;
  }
  .cat-level-btn:active { transform: scale(0.96); }
  .cat-level-count {
    font-size: 0.72rem; color: var(--muted); font-weight: 500; margin-top: 2px;
  }
  .cat-back {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.82rem; font-weight: 600; padding: 6px 14px;
    border-radius: 20px; border: 1.5px solid var(--light);
    cursor: pointer; background: var(--white); color: #777;
    margin-top: 10px; -webkit-tap-highlight-color: transparent;
  }
  .cat-back:active { transform: scale(0.96); }

  /* Finished */
  .finished {
    width: min(440px, 90vw); background: var(--white); border-radius: 20px;
    padding: 48px 32px; text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
  }
  .finished-emoji { font-size: 3rem; margin-bottom: 16px; }
  .finished-title { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
  .finished-sub {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.88rem; color: var(--muted); margin-bottom: 20px;
  }
  .finished-stats {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex; justify-content: center; gap: 24px;
    font-size: 1rem; font-weight: 700; margin-bottom: 28px;
  }
  .restart-btn {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-weight: 700; font-size: 1rem; padding: 14px 36px;
    background: var(--black); color: white; border: none;
    border-radius: 14px; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .restart-btn:active { transform: scale(0.96); }

  .footer {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.7rem; color: #ccc; margin-top: 36px; text-align: center;
  }

  /* SRS */
  .srs-badge {
    position: absolute; top: 10px; right: 14px;
    display: flex; gap: 3px; align-items: center;
  }
  .srs-dot { width: 6px; height: 6px; border-radius: 50%; }
  .srs-summary {
    display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.72rem; color: var(--muted); margin-top: 6px;
  }
  .srs-chip { display: flex; align-items: center; gap: 4px; font-weight: 600; }
  .srs-reset {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.72rem; color: #bbb; background: none; border: 1px solid #ddd;
    border-radius: 20px; padding: 5px 14px; cursor: pointer; margin-top: 12px;
    -webkit-tap-highlight-color: transparent;
  }
</style>
</head>

<div class="app" id="app"></div>

<script>
// Tag helper — wraps cards with category
function C(cat, cards) { return cards.map(c => ({ ...c, cat })); }

// Compact pipe helper: "der Hund|il cane|der" or "sprechen|parlare|haben+gesprochen" or "groß|grande"
function P(cat, str) {
  return str.trim().split('\n').filter(l => l.trim()).map(line => {
    const [de, it, third] = line.split('|').map(s => s.trim());
    const card = { de, it, cat };
    if (third) { if (/^(der|die|das)$/.test(third)) card.genus = third; else card.nota = third; }
    return card;
  });
}

function cardType(c) {
  if (c.genus) return "noun";
  if (c.nota) return "verb";
  if (/[\s,!?.'…]/.test(c.de)) return "phrase";
  return "adj";
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const POOL_SIZE = 40;
const SRS_INTERVALS = [0, 1, 3, 7, 14, 30];
const SRS_COLORS = ["#dc2626","#ea580c","#ca8a04","#16a34a","#2563eb","#7c3aed"];

function srsLoad() {
  try { return JSON.parse(localStorage.getItem("fc_srs") || "{}"); } catch { return {}; }
}
function srsSave(data) {
  try { localStorage.setItem("fc_srs", JSON.stringify(data)); } catch {}
}
function srsGet(de) {
  return srsLoad()[de] || { level: 0, nextReview: null, correct: 0, wrong: 0 };
}
function srsUpdate(de, correct) {
  const data = srsLoad();
  const e = data[de] || { level: 0, nextReview: null, correct: 0, wrong: 0 };
  if (correct) {
    e.level = Math.min(5, e.level + 1);
    e.correct = (e.correct || 0) + 1;
    const days = SRS_INTERVALS[e.level];
    if (days > 0) {
      const d = new Date();
      d.setDate(d.getDate() + days);
      e.nextReview = d.toISOString().split("T")[0];
    } else {
      e.nextReview = null;
    }
  } else {
    e.level = 0;
    e.wrong = (e.wrong || 0) + 1;
    e.nextReview = null;
  }
  data[de] = e;
  srsSave(data);
}
function todayStr() { return new Date().toISOString().split("T")[0]; }
function srsDeckStats(cards) {
  const data = srsLoad();
  const today = todayStr();
  let due = 0, unseen = 0, mastered = 0;
  for (const c of cards) {
    const e = data[c.de];
    if (!e) { unseen++; continue; }
    if (e.level >= 5 && e.nextReview && e.nextReview > today) { mastered++; continue; }
    if (!e.nextReview || e.nextReview <= today) due++;
  }
  return { due, unseen, mastered };
}
function srsBadgeHTML(de) {
  const e = srsGet(de);
  const lv = e.level;
  const col = SRS_COLORS[lv];
  const dots = Array.from({length: 5}, (_, i) =>
    `<span class="srs-dot" style="background:${i < lv ? col : 'rgba(0,0,0,0.1)'}"></span>`
  ).join('');
  return `<div class="srs-badge">${dots}</div>`;
}

function makedeck(lvl, filter, cat) {
  let cards = lvl === "Cust" ? state.customCards : CARDS[lvl];
  if (!cards || cards.length === 0) return [];
  if (cat && cat !== "all") cards = cards.filter(c => c.cat === cat);
  if (filter && filter !== "all" && lvl !== "Cust" && !cat) {
    cards = cards.filter(c => cardType(c) === filter);
  }
  if (cards.length === 0) return [];
  if (lvl === "Cust") return shuffle([...cards]);

  const data = srsLoad();
  const today = todayStr();
  const due = [], unseen = [], notDue = [];

  for (const card of cards) {
    const e = data[card.de];
    if (!e) { unseen.push(card); continue; }
    if (!e.nextReview || e.nextReview <= today) due.push({ card, e });
    else notDue.push({ card, e });
  }

  due.sort((a, b) => {
    if (a.e.level !== b.e.level) return a.e.level - b.e.level;
    if (!a.e.nextReview && !b.e.nextReview) return 0;
    if (!a.e.nextReview) return -1;
    if (!b.e.nextReview) return 1;
    return a.e.nextReview.localeCompare(b.e.nextReview);
  });

  const result = due.map(x => x.card);
  if (result.length < POOL_SIZE)
    result.push(...shuffle(unseen).slice(0, POOL_SIZE - result.length));
  if (result.length < POOL_SIZE) {
    notDue.sort((a, b) => a.e.level - b.e.level);
    result.push(...notDue.map(x => x.card).slice(0, POOL_SIZE - result.length));
  }
  return result.slice(0, POOL_SIZE);
}

function catCount(cat, lvl) {
  const cards = CARDS[lvl];
  return cards ? cards.filter(c => c.cat === cat).length : 0;
}

let state = {
  screen: "game",
  level: "A1",
  filter: "all",
  category: null,
  deck: makedeck("A1", "all"),
  poolSize: 0,
  index: 0,
  flipped: false,
  direction: "de-it",
  doneCount: 0,
  totalWrong: 0,
  animating: false,
  finished: false,
  customCards: [],
  customRaw: "",
  customMode: false,
  lastAction: null,
};
state.poolSize = state.deck.length;

function toggleDirection() {
  state.direction = state.direction === "de-it" ? "it-de" : "de-it";
  state.flipped = false;
  render();
}

function setLevel(lvl) {
  state.level = lvl;
  state.screen = "game";
  if (lvl === "Cust") {
    state.customMode = true;
    state.filter = "all";
    state.category = null;
    state.deck = [];
    state.poolSize = 0;
  } else {
    state.customMode = false;
    state.category = null;
    state.deck = makedeck(lvl, state.filter);
    state.poolSize = state.deck.length;
  }
  state.index = 0;
  state.flipped = false;
  state.doneCount = 0;
  state.totalWrong = 0;
  state.finished = false;
  state.lastAction = null;
  render();
}

function setFilter(f) {
  state.filter = f;
  state.deck = makedeck(state.level, f);
  state.poolSize = state.deck.length;
  state.index = 0;
  state.flipped = false;
  state.doneCount = 0;
  state.totalWrong = 0;
  state.finished = false;
  state.lastAction = null;
  render();
}

function showCategories() {
  state.screen = "categories";
  state.level = "Categories";
  state.category = null;
  render();
}

function showCatLevels(cat) {
  state.screen = "cat-levels";
  state.category = cat;
  render();
}

function startCatLevel(cat, lvl) {
  state.screen = "game";
  state.level = lvl;
  state.category = cat;
  state.filter = "all";
  state.customMode = false;
  state.deck = makedeck(lvl, "all", cat);
  state.poolSize = state.deck.length;
  state.index = 0;
  state.flipped = false;
  state.doneCount = 0;
  state.totalWrong = 0;
  state.finished = false;
  state.lastAction = null;
  render();
}

function flipCard() {
  if (state.animating || state.finished || state.deck.length === 0) return;
  state.flipped = !state.flipped;
  render();
}

function nextCard(dir, result) {
  if (state.animating || state.deck.length === 0) return;
  state.animating = true;

  const prevIndex = state.index;
  const prevDone = state.doneCount;
  const prevWrong = state.totalWrong;
  let pushedCard = false;

  const currentCard = state.deck[state.index];
  const prevSRS = (currentCard && state.level !== "Cust")
    ? { de: currentCard.de, entry: { ...srsGet(currentCard.de) } }
    : null;

  if (result === "correct") {
    state.doneCount++;
    if (currentCard && state.level !== "Cust") srsUpdate(currentCard.de, true);
  } else if (result === "wrong") {
    state.totalWrong++;
    if (currentCard && state.level !== "Cust") srsUpdate(currentCard.de, false);
    state.deck.push(state.deck[state.index]);
    pushedCard = true;
  }

  state.lastAction = { prevIndex, prevDone, prevWrong, pushedCard, result, prevSRS };

  if (state.doneCount >= state.poolSize) {
    state.finished = true;
    state.animating = false;
    render();
    return;
  }

  const inner = document.getElementById("card-inner");
  if (inner) inner.classList.add(dir === "right" ? "go-right" : "go-left");

  setTimeout(() => {
    state.index++;
    state.flipped = false;
    state.animating = false;
    render();
  }, 280);
}

function undoLast() {
  if (!state.lastAction) return;
  const a = state.lastAction;
  state.lastAction = null;
  state.finished = false;
  state.index = a.prevIndex;
  state.doneCount = a.prevDone;
  state.totalWrong = a.prevWrong;
  state.flipped = false;
  if (a.pushedCard) state.deck.pop();
  if (a.prevSRS) {
    const data = srsLoad();
    data[a.prevSRS.de] = a.prevSRS.entry;
    srsSave(data);
  }
  state.animating = false;
  render();
}

function restart() {
  if (state.level === "Cust") {
    state.customMode = true;
    state.deck = [];
    state.poolSize = 0;
  } else if (state.category) {
    state.deck = makedeck(state.level, "all", state.category);
    state.poolSize = state.deck.length;
  } else {
    state.deck = makedeck(state.level, state.filter);
    state.poolSize = state.deck.length;
  }
  state.index = 0;
  state.flipped = false;
  state.doneCount = 0;
  state.totalWrong = 0;
  state.finished = false;
  render();
}

function parseCustomCards(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l);
  const cards = [];
  for (const line of lines) {
    const sep = line.includes(' – ') ? ' – ' : ' - ';
    const idx = line.indexOf(sep);
    if (idx < 0) continue;
    const de = line.slice(0, idx).trim();
    const it = line.slice(idx + sep.length).trim();
    if (!de || !it) continue;
    const card = { de, it };
    const genusMatch = de.match(/^(der|die|das)\s+/i);
    if (genusMatch) card.genus = genusMatch[1].toLowerCase();
    cards.push(card);
  }
  return cards;
}

function startCustom() {
  const ta = document.getElementById('custom-textarea');
  const text = ta ? ta.value.trim() : '';
  if (!text) return;
  state.customRaw = text;
  state.customCards = parseCustomCards(text);
  if (state.customCards.length === 0) return;
  state.customMode = false;
  state.deck = makedeck("Cust", "all");
  state.poolSize = state.deck.length;
  state.index = 0;
  state.flipped = false;
  state.doneCount = 0;
  state.totalWrong = 0;
  state.finished = false;
  render();
}

function render() {
  const app = document.getElementById("app");
  const isDeIt = state.direction === "de-it";

  const headerHTML = `
    <div class="header">
      <div class="title">FlashCards</div>
      <button class="dir-toggle ${isDeIt ? "" : "reversed"}" onclick="toggleDirection()">

      </button>
    </div>`;

  const levelBarHTML = `
    <div class="categories">
      ${Object.keys(LEVEL_LABELS).map(key =>
        `<button class="cat-btn ${state.level === key ? "active" : ""}" onclick="setLevel('${key}')">${LEVEL_LABELS[key]}</button>`
      ).join("")}
      <button class="cat-btn ${state.screen === 'categories' || state.screen === 'cat-levels' ? 'active' : ''}" onclick="showCategories()">Cat.</button>
    </div>`;

  // Category grid screen
  if (state.screen === "categories") {
    app.innerHTML = `
      ${headerHTML}
      ${levelBarHTML}
      <div class="cat-grid">
        ${Object.entries(CATEGORIES).map(([key, c]) => `
          <button class="cat-grid-btn" onclick="showCatLevels('${key}')">
            <span class="cat-grid-icon">${c.icon}</span>
            <span class="cat-grid-label">${c.label}</span>
          </button>
        `).join("")}
      </div>
    `;
    return;
  }

  // Category levels screen
  if (state.screen === "cat-levels") {
    const catInfo = CATEGORIES[state.category];
    const levels = ["A1", "A2", "B1", "B2"];
    app.innerHTML = `
      ${headerHTML}
      ${levelBarHTML}
      <div class="cat-levels">
        <button class="cat-back" onclick="showCategories()">← All the categories</button>
        <div class="cat-levels-title">${catInfo.icon} ${catInfo.label}</div>
        <div class="cat-level-grid">
          ${levels.map(lvl => {
            const cnt = catCount(state.category, lvl);
            if (cnt === 0) return "";
            return `<button class="cat-level-btn" onclick="startCatLevel('${state.category}','${lvl}')">
              ${lvl}<div class="cat-level-count">${cnt} words</div>
            </button>`;
          }).join("")}
        </div>
      </div>
    `;
    return;
  }

  // Custom input screen
  const isCust = state.level === "Cust";
  if (isCust && state.customMode) {
    app.innerHTML = `
      ${headerHTML}
      ${levelBarHTML}
      <div class="custom-input-area">
        <textarea id="custom-textarea" placeholder="der Hund - il cane&#10;die Katze - la gatta&#10;essen - mangiare&#10;groß - grande">${state.customRaw}</textarea>
        <div class="custom-hint">
          One word per line: <b>German - Italian</b><br>
          Add <b>der / die / das</b> for nouns
        </div>
        <button class="custom-start-btn" onclick="startCustom()">Start →</button>
      </div>
    `;
    return;
  }

  // Game screen
  const card = state.deck[state.index] || {};
  const total = state.poolSize;
  const progress = total > 0 ? (state.doneCount / total) * 100 : 0;
  const genusColor = card.genus ? GENUS_COLOR[card.genus] : "#1a1a1a";
  const isVerb = !!card.nota;
  const isCatGame = !!state.category;

  const legendHTML = `
    <div class="legend">
      ${Object.entries(GENUS_COLOR).map(([g, c]) => `
        <div class="legend-item">
          <div class="leg-dot" style="background:${c}"></div>
          <span>${g} = ${GENUS_LABEL[g]}</span>
        </div>`).join("")}
    </div>`;

  const filtersHTML = `
    <div class="filters">
      ${Object.entries(FILTER_LABELS).map(([key, label]) => `
        <button class="filter-btn ${state.filter === key ? "active" : ""}" onclick="setFilter('${key}')">${label}</button>
      `).join("")}
    </div>`;

  const editBtn = isCust && !state.finished ? `<div style="text-align:center;margin-top:4px"><button class="filter-btn" onclick="state.customMode=true;render()">✎ Edit list</button></div>` : "";

  const catLabel = isCatGame ? `<div style="text-align:center;margin-top:4px"><span class="filter-btn active" style="cursor:default">${CATEGORIES[state.category].icon} ${CATEGORIES[state.category].label}</span></div>` : "";

  let frontContent, backContent;
  if (state.deck.length === 0) {
    // handled below
  } else if (isDeIt) {
    frontContent = `
      ${srsBadgeHTML(card.de)}
      ${card.genus ? `<div class="article-badge" style="background:${genusColor}">${card.genus}</div>` : ""}
      ${isVerb ? `<div class="verb-label">VERB</div>` : ""}
      <div class="german-word">${card.de || ""}</div>
      ${card.nota ? `<div class="verb-nota">${card.nota}</div>` : ""}
      <div class="tap-hint">↕ tap to flip</div>
    `;
    backContent = `
      <div class="back-label">🇮🇹 in Italian</div>
      <div class="italian-word">${card.it || ""}</div>
    `;
  } else {
    frontContent = `
      ${srsBadgeHTML(card.de)}
      <div class="back-label" style="color:#aaa">🇮🇹 Italian</div>
      <div class="german-word">${card.it || ""}</div>
      <div class="tap-hint">↕ tap to flip</div>
    `;
    backContent = `
      <div class="back-label">🇩🇪 in German</div>
      ${card.genus ? `<div class="article-badge" style="background:${genusColor}">${card.genus}</div>` : ""}
      ${isVerb ? `<div class="verb-label">VERB</div>` : ""}
      <div class="italian-word">${card.de || ""}</div>
      ${card.nota ? `<div class="verb-nota">${card.nota}</div>` : ""}
    `;
  }

  let cardAreaHTML;
  if (state.deck.length === 0) {
    cardAreaHTML = `<div class="empty-state">No cards for this selection.</div>`;
  } else if (state.finished) {
    cardAreaHTML = `
      <div class="finished">
        <div class="finished-emoji">🎉</div>
        <div class="finished-title">Done!</div>
        <div class="finished-sub">${total} words · ${state.level}${isCatGame ? " · " + CATEGORIES[state.category].label : ""}</div>
        <div class="finished-stats">
          <span style="color:#16a34a">✓ ${total} correct</span>
          <span style="color:#dc2626">✗ ${state.totalWrong} wrong</span>
        </div>
        <button class="restart-btn" onclick="restart()">Restart →</button>
        <div><button class="srs-reset" onclick="if(confirm('Reset all SRS progress?')){localStorage.removeItem('fc_srs');restart();}">Reset SRS progress</button></div>
      </div>
    `;
  } else {
    cardAreaHTML = `
      <div class="card-wrapper" id="card-wrapper" onclick="flipCard()">
        <div class="card-inner ${state.flipped ? "flipped" : ""}" id="card-inner">
          <div class="card-face card-front">${frontContent}</div>
          <div class="card-face card-back">${backContent}</div>
        </div>
      </div>
    `;
  }

  const actionsHTML = (!state.finished && state.deck.length > 0) ? `
    <div class="actions">
      <button class="action-btn btn-unknown" onclick="nextCard('left','wrong')">✗ Wrong</button>
      <button class="action-btn btn-known" onclick="nextCard('right','correct')">✓ Correct</button>
    </div>
    ${state.lastAction ? `<button class="cat-back" style="margin-top:6px" onclick="undoLast()">↩ Undo</button>` : ""}
    <div class="swipe-hint">← swipe to answer →</div>
  ` : "";

  const showFilters = !isCust && !isCatGame;

  let srsStatsCards = null;
  if (!isCust && CARDS[state.level]) {
    srsStatsCards = CARDS[state.level];
    if (state.category && state.category !== "all")
      srsStatsCards = srsStatsCards.filter(c => c.cat === state.category);
    else if (state.filter && state.filter !== "all")
      srsStatsCards = srsStatsCards.filter(c => cardType(c) === state.filter);
  }
  const srsStats = srsStatsCards ? srsDeckStats(srsStatsCards) : null;
  const srsSummaryHTML = srsStats ? `
    <div class="srs-summary">
      ${srsStats.due > 0 ? `<div class="srs-chip" style="color:#ea580c">📅 ${srsStats.due} to review</div>` : ''}
      ${srsStats.unseen > 0 ? `<div class="srs-chip">✨ ${srsStats.unseen} new</div>` : ''}
      <div class="srs-chip" style="color:#7c3aed">⭐ ${srsStats.mastered} mastered</div>
    </div>
  ` : '';

  app.innerHTML = `
    ${headerHTML}
    ${levelBarHTML}
    ${srsSummaryHTML}
    ${showFilters ? filtersHTML + legendHTML : ""}
    ${catLabel}
    ${editBtn}

    <div class="progress-wrap">
      <div class="progress-info">
        <span>${state.doneCount} / ${total}</span>
        <div class="stats">
          <div class="stat">
            <div class="stat-dot" style="background:#16a34a"></div>
            <span style="color:#16a34a">${state.doneCount}</span>
          </div>
          <div class="stat">
            <div class="stat-dot" style="background:#dc2626"></div>
            <span style="color:#dc2626">${state.totalWrong}</span>
          </div>
        </div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${progress}%"></div>
      </div>
    </div>

    <div class="card-area">${cardAreaHTML}</div>
    ${actionsHTML}
  `;
}

// Keyboard
document.addEventListener("keydown", (e) => {
  if (e.key === " " || e.key === "Enter") { e.preventDefault(); flipCard(); }
  else if (e.key === "ArrowRight") nextCard("right", "correct");
  else if (e.key === "ArrowLeft") nextCard("left", "wrong");
});

// Swipe
let touchStart = null;
document.addEventListener("touchstart", e => {
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });
document.addEventListener("touchend", e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  touchStart = null;
  if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    dx > 0 ? nextCard("right", "correct") : nextCard("left", "wrong");
  }
}, { passive: true });

render();
</script>
